<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>YouTube Playlist Player</title>

  <link rel="stylesheet" 
      href="https://cdn.jsdelivr.net/gh/gramophono/oneYTplayer@main/cssblue.css"
        crossorigin="anonymous">
  
  
  
</head>
<body>
  <div class="main-container">
    <div class="player-wrapper">
      <div class="video-section">
        <div class="player-screen">
          <div id="player"></div>
        </div>
        <div class="player-controls">
          <button onclick="playPrevVideo()">
            <span>⏮</span> Προηγούμενο
          </button>
          <button onclick="playNextVideo()">
            <span>⏭</span> Επόμενο
          </button>
        </div>
      </div>
      
      <div class="playlist-section">
        <div class="playlist-header" id="playlist-header">
          <div class="playlist-info">
            <img id="playlist-header-thumb" class="playlist-header-thumb" src="https://cdn.jsdelivr.net/gh/myrovolistisgr/YT-playlists-player@main/anartiseis/tango,%20gipsy%20and%20more.jpg" alt="playlist cover">
            <div class="playlist-info-text">
                <h2 id="current-playlist-title">🎵 Φόρτωση playlist...</h2>
                <p id="current-playlist-count">Αναμονή...</p>
            </div>
          </div>
        </div>
        
        <div class="songs-container">
          <h3>🎵 Τραγούδια</h3>
          <ul class="songs-list" id="songs-list"></ul>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ΤΟ URL ΤΟΥ CLOUDFLARE WORKER ΚΑΙ ΤΟ PLAYLIST ID
    const SCRIPT_URL = 'https://icy-violet-4cf8.myrovolistisgr.workers.dev';
    const PLAYLIST_ID = 'PL00rmG2oN8Ag6enwCeI1Iy4738xesOX5w';
    
    let youtubePlayer;
    let currentPlaylist = [];
    let currentVideoIndex = 0;
    let isLastVideoEnded = false;
    let playerReady = false;
    
    window.addEventListener('DOMContentLoaded', function() {
      console.log('YouTube Playlist Player loading...');
      initializePlayer();
      enableMobileScrolling();
      preventPageScroll();
    });
    
    function preventPageScroll() {
      document.querySelectorAll('.player-controls button').forEach(button => {
        button.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
        });
      });
    }
    
    function enableMobileScrolling() {
      const songsContainer = document.querySelector('.songs-container');
      if (songsContainer) {
        songsContainer.style.touchAction = 'pan-y';
        songsContainer.style.webkitOverflowScrolling = 'touch';
      }
    }
    
    async function initializePlayer() {
      loadYouTubeAPI();
      // Φόρτωσε απευθείας την playlist
      loadPlaylistFromYouTube(PLAYLIST_ID);
    }
    
    function loadYouTubeAPI() {
      if (window.YT && window.YT.Player) {
        createYouTubePlayer();
        return;
      }
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      const firstScriptTag = document.getElementsByTagName('script')[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
      window.onYouTubeIframeAPIReady = function() {
        createYouTubePlayer();
      };
    }
    
    function createYouTubePlayer() {
      youtubePlayer = new YT.Player('player', {
        height: '100%',
        width: '100%',
        videoId: '',
        events: {
          onReady: (event) => {
              console.log('YouTube Player ready');
              playerReady = true;
              if (currentPlaylist.length > 0) {
                  youtubePlayer.cueVideoById(currentPlaylist[0].videoId);
              }
          },
          onStateChange: (event) => {
            if (event.data === YT.PlayerState.ENDED) {
              if (currentVideoIndex === currentPlaylist.length - 1) {
                isLastVideoEnded = true;
              } else {
                setTimeout(playNextVideo, 100);
              }
            }
            if (event.data === YT.PlayerState.PLAYING) isLastVideoEnded = false;
          },
          onError: (error) => {
            console.error('YouTube Player error:', error);
            if (currentVideoIndex < currentPlaylist.length - 1) playNextVideo();
          }
        },
        playerVars: { 
          autoplay: 0, 
          controls: 1, 
          rel: 0, 
          modestbranding: 1, 
          fs: 1,
          origin: window.location.origin
        }
      });
    }
    
    function loadPlaylistFromYouTube(playlistId) {
      const url = `${SCRIPT_URL}?action=getPlaylist&playlistId=${playlistId}`;
      
      document.getElementById('current-playlist-count').textContent = 'Φόρτωση...';
      
      fetch(url)
        .then(response => response.json())
        .then(data => {
            document.getElementById('current-playlist-title').textContent = data.playlistTitle;
            document.title = data.playlistTitle;
            
            currentPlaylist = data.songs || [];
            currentVideoIndex = 0;
            renderSongsList();
            updatePlaylistHeader();
            
            if (youtubePlayer && currentPlaylist.length > 0 && playerReady) {
                youtubePlayer.cueVideoById(currentPlaylist[0].videoId);
            }
        })
        .catch(error => {
            console.error('Σφάλμα φόρτωσης playlist:', error);
            document.getElementById('current-playlist-count').textContent = 'Σφάλμα φόρτωσης';
            document.getElementById('current-playlist-title').textContent = 'Σφάλμα φόρτωσης';
        });
    }
    
    function updatePlaylistHeader() {
      const countElement = document.getElementById('current-playlist-count');
      countElement.textContent = (currentPlaylist.length > 0) ? `${currentPlaylist.length} τραγούδια` : 'Κενή playlist';
      countElement.style.color = (currentPlaylist.length > 0) ? 'white' : '#ffcccc';
      
      // Προσθήκη full-title class αν χρειάζεται
      const header = document.getElementById('playlist-header');
      header.classList.add('full-title');
    }
    
    function renderSongsList() {
      const list = document.getElementById('songs-list');
      list.innerHTML = '';
      document.querySelector('.songs-container').scrollTop = 0;
      
      currentPlaylist.forEach((song, index) => {
        const listItem = document.createElement('li');
        listItem.className = `song-item ${index === currentVideoIndex ? 'active' : ''}`;
        listItem.onclick = () => playVideo(song.videoId, index);
        listItem.innerHTML = `<img class="song-thumb" src="${song.thumbnail}" alt="" loading="lazy"><div class="song-title">${index + 1}. ${song.title}</div>`;
        list.appendChild(listItem);
      });
      updateActiveSongItem();
    }
    
    function playVideo(videoId, index) {
      currentVideoIndex = index;
      isLastVideoEnded = false;
      if (youtubePlayer && typeof youtubePlayer.loadVideoById === 'function') {
        youtubePlayer.loadVideoById(videoId);
      }
      updateActiveSongItem();
    }

    function updateActiveSongItem() {
      const container = document.querySelector('.songs-container');

      document.querySelectorAll('.song-item').forEach((item, idx) => {
        item.classList.toggle('active', idx === currentVideoIndex);

        if (idx === currentVideoIndex) {
          const itemTop = item.offsetTop;
          const itemHeight = item.offsetHeight;
          const containerHeight = container.clientHeight;

          container.scrollTo({
            top: itemTop - containerHeight / 2 + itemHeight / 2,
            behavior: 'smooth'
          });
        }
      });
    }
    
    function playNextVideo() {
      if (currentPlaylist.length === 0) return;
      let nextIndex = (isLastVideoEnded || currentVideoIndex >= currentPlaylist.length - 1) ? 0 : currentVideoIndex + 1;
      playVideo(currentPlaylist[nextIndex].videoId, nextIndex);
    }
    
    function playPrevVideo() {
      if (currentPlaylist.length === 0) return;
      let prevIndex = (currentVideoIndex <= 0) ? currentPlaylist.length - 1 : currentVideoIndex - 1;
      playVideo(currentPlaylist[prevIndex].videoId, prevIndex);
    }
    
    // Keyboard shortcuts
    document.addEventListener('keydown', (event) => {
      if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') return;
      if (event.key === 'ArrowLeft') { event.preventDefault(); playPrevVideo(); }
      if (event.key === 'ArrowRight') { event.preventDefault(); playNextVideo(); }
      if (event.key === ' ' && youtubePlayer) {
        event.preventDefault();
        const state = youtubePlayer.getPlayerState();
        if (state === YT.PlayerState.PLAYING) youtubePlayer.pauseVideo();
        else youtubePlayer.playVideo();
      }
    });
    
    document.addEventListener('touchstart', () => {}, { passive: true });
  </script>
</body>
</html>
